          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
          name: vllm
          ports:
          - containerPort: 8000
            name: rank0
            protocol: TCP
          - containerPort: 8001
            name: rank1
            protocol: TCP
          - containerPort: 8002
            name: rank2
            protocol: TCP
          - containerPort: 8003
            name: rank3
            protocol: TCP
          - containerPort: 8004
            name: rank4
            protocol: TCP
          - containerPort: 8005
            name: rank5
            protocol: TCP
          - containerPort: 8006
            name: rank6
            protocol: TCP
          - containerPort: 8007
            name: rank7
            protocol: TCP
          - containerPort: 8008
            name: supervisor
            protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              ephemeral-storage: 1Ti
              memory: 512Gi
              nvidia.com/gpu: "8"
            requests:
              cpu: 32
              ephemeral-storage: 1Ti
              memory: 512Gi
              nvidia.com/gpu: "8"
          securityContext:
