apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-llm-d-decode
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "wide-ep-lws"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: DeepSeek-R1-0528-NVFP4-v2
    llm-d.ai/role: decode
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/inference-serving: "true"
          llm-d.ai/guide: "wide-ep-lws"
          llm-d.ai/accelerator-variant: "gpu"
          llm-d.ai/accelerator-vendor: "nvidia"
          llm-d.ai/model: DeepSeek-R1-0528-NVFP4-v2
          llm-d.ai/role: decode
      spec:
        serviceAccountName: a4x-baker-wfi
        nodeSelector:
          cloud.google.com/gke-nodepool: a4x-highgpu-4g-a4x-pool-4
        initContainers:
          - name: routing-proxy
            args:
              # sidecar proxy is started with --port 8000, --vllm-port 8200, and --data-parallel-size 8,
              # so it listens on ports in the range [port:port+data-parallel-size-1] and forwards
              # requests each to the corresponding vllm port.
              - --port=8000
              - --vllm-port=8200
              - --data-parallel-size=4
              - --connector=nixlv2
              - --zap-log-level=5
              - --secure-proxy=false
              - --enable-prefiller-sampling
            # env:
              # To enable tracing on routing proxies, add these env vars to each routing-proxy-rankN container:
              # - name: OTEL_SERVICE_NAME
              #   value: "routing-proxy"
              # - name: OTEL_EXPORTER_OTLP_ENDPOINT
              #   value: "http://otel-collector:4317"
              # - name: OTEL_TRACES_SAMPLER
              #   value: "parentbased_traceidratio"
              # - name: OTEL_TRACES_SAMPLER_ARG
              #   value: "0.1"
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.8.0
            imagePullPolicy: Always
            ports:
              - containerPort: 8000
                name: rank0
                protocol: TCP
              - containerPort: 8001
                name: rank1
                protocol: TCP
              - containerPort: 8002
                name: rank2
                protocol: TCP
              - containerPort: 8003
                name: rank3
                protocol: TCP
              - containerPort: 8004
                protocol: TCP
            resources: {}
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi  # roughly 32MB per local DP plus scratch space
          - name: hf-cache
            emptyDir: {}
          - name: jit-cache
            emptyDir: {}
        containers:
          - name: vllm
            image: ghcr.io/llm-d/llm-d-cuda:v0.7.0
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                # Clear /dev/shm on start to prevent running out of space when crashes occur
                # https://github.com/llm-d/llm-d/issues/352
                find /dev/shm -type f -delete

                export LD_LIBRARY_PATH=/usr/local/gib/lib64:/usr/local/nvidia/lib64:/usr/local/cuda/lib64:/opt/nvshmem-v3.4.5-0/lib:/opt/nvshmem-v3.4.5-0/lib64:/opt/ucx/lib:/opt/ucx/lib64:/usr/lib/x86_64-linux-gnu:/usr/lib/aarch64-linux-gnu:${LD_LIBRARY_PATH}
                export LIBRARY_PATH=/usr/local/nvidia/lib64:$LIBRARY_PATH

                #################
                # RUN vLLM decode workers
                #################
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                [ -n "${KV_CACHE_MEMORY_BYTES}" ] && EXTRA_VLLM_ARGS=(--kv-cache-memory-bytes="${KV_CACHE_MEMORY_BYTES}") || EXTRA_VLLM_ARGS=()

                # For GKE A4 (B200) Blackwell instances, single-pod prefill groups (LWS_GROUP_SIZE=1)
                # and decode leader pods must rendezvous over local loopback (127.0.0.1) to avoid socket
                # binding collisions on secondary RDMA network interfaces (eth2-eth9) during startup.
                if [ "${LWS_GROUP_SIZE:-1}" -eq 1 ] || [ "${LWS_WORKER_INDEX:-0}" -eq 0 ]; then
                    # Prefill pods AND the Decode Leader pod automatically use safe local loopback
                    DP_ADDR="127.0.0.1"
                else
                    # Decode Worker pods dynamically look up the leader's network IP
                    DP_ADDR="${LWS_LEADER_ADDRESS}"
                fi

                COMMON_VLLM_ARGS=(
                  --disable-uvicorn-access-log
                  --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL))
                  --data-parallel-address="${DP_ADDR}"
                  --data-parallel-rpc-port=5555
                  --data-parallel-external-lb
                  --enable-expert-parallel
                  --kv_transfer_config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}'
                  --all2all-backend "deepep_low_latency"
                  "${EXTRA_VLLM_ARGS[@]}"
                )

                for i in $(seq 0 $((DP_SIZE_LOCAL - 1))); do
                    CUDA_VISIBLE_DEVICES="$i" vllm serve "${VLLM_MODEL:-deepseek-ai/DeepSeek-R1-0528}" --host=0.0.0.0 --port=$((8200 + i)) --data-parallel-rank=$((START_RANK + i)) "${COMMON_VLLM_ARGS[@]}" &
                done
                wait
              - vllm-parallel-launcher

            env:
              - name: VLLM_MOE_DP_CHUNK_SIZE
                value: "384"  # vLLM default is 256
              - name: DP_SIZE_LOCAL
                value: "4"
              - name: TP_SIZE
                value: "1"
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_SKIP_P2P_CHECK
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVSHMEM_CUMEM_HANDLE_TYPE
                value: "FABRIC"
              - name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
                value: "1"
              # DeepEP low-latency only: NVFP4 dispatch + masked_gemm
              - name: VLLM_DEEPEPLL_NVFP4_DISPATCH
                value: "1"
              - name: VLLM_FLASHINFER_MOE_BACKEND
                value: "masked_gemm"
              - name: NVIDIA_GDRCOPY
                value: enabled
              - name: NVSHMEM_REMOTE_TRANSPORT
                value: ibgda
              - name: NVSHMEM_IB_ENABLE_IBGDA
                value: "true"
              - name: NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME
                value: eth0
              - name: GLOO_SOCKET_IFNAME
                value: eth0
              - name: NCCL_SOCKET_IFNAME
                value: eth0
              - name: VLLM_LOGGING_LEVEL
                value: DEBUG
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"
              - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
               # Enable on-demand profiling via /start_profile and /stop_profile
              - name: VLLM_TORCH_PROFILER_DIR
                value: "/traces"
              - name: CUDA_CACHE_PATH
                value: /var/cache/vllm/cuda
              - name: CCACHE_DIR
                value: /var/cache/vllm/ccache
              - name: VLLM_CACHE_ROOT
                value: /var/cache/vllm/vllm
              - name: FLASHINFER_WORKSPACE_BASE
                value: /var/cache/vllm/flashinfer
              - name: FLASHINFER_CACHE_DIR
                value: /var/cache/vllm/flashinfer_cache_extdp
              # HuggingFace is likely to be quite a bit larger, give it its own cache
              - name: HF_HUB_CACHE
                value: /var/cache/huggingface
              - name: UCX_LOG_LEVEL
                value: debug
              - name: NIXL_LOG_LEVEL
                value: DEBUG
            ports:
              - containerPort: 8200
                name: rank0
                protocol: TCP
              - containerPort: 8201
                name: rank1
                protocol: TCP
              - containerPort: 8202
                name: rank2
                protocol: TCP
              - containerPort: 8203
                name: rank3
                protocol: TCP

            startupProbe:
              httpGet:
                path: /health
                port: rank0
              initialDelaySeconds: 0
              periodSeconds: 1
              timeoutSeconds: 5
              failureThreshold: 2700
            livenessProbe:
              httpGet:
                path: /health
                port: rank0
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /v1/models
                port: rank0
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            resources:
              limits:
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - name: dshm
                mountPath: /dev/shm
              - name: hf-cache
                mountPath: /var/cache/huggingface
              - name: jit-cache
                mountPath: /var/cache/vllm
