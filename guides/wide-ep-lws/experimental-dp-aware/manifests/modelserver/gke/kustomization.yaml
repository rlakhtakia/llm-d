apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../gke-common
components:
  - ../../../../../recipes/modelserver/components/disable-gke-nccl-tuner-patch

images:
  - name: ghcr.io/llm-d/llm-d-cuda
    newName: ghcr.io/llm-d/llm-d-cuda-dev
    newTag: pr-1769

patches:
  - target:
      kind: LeaderWorkerSet
    patch: |-
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/affinity/nodeAffinity
        value:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cloud.google.com/gke-accelerator
                    operator: In
                    values:
                      - nvidia-h200-141gb
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-decode
    patch: |-
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: KV_CACHE_MEMORY_BYTES
          value: "50000000000"
